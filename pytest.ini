[pytest]
addopts = -ra --capture=tee-sys
testpaths = tests
xfail_strict = true
console_output_style = progress
markers =
    unit: Fast tests for pure logic and file transformations.
    workflow: Tests for pipeline orchestration and report generation.
    e2e: Real Windows UI workflow tests that launch desktop applications.
    ai_turbo: Tests that require AI Turbo Engine to be installed and configured.
    manual: Operator-driven tests that should be started intentionally.
    windows: Tests that require a Windows desktop environment.
